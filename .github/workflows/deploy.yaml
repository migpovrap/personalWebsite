name: Deploy to Cloudflare Worker
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Build Cloudflare Types
        run: yarn cf-typegen

      - name: Replace Cloudflare IDs dynamically
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_STORE_ID: ${{ secrets.CF_STORE_ID }}
        run: |
          sed -i "s|ACCOUNT_ID_PLACEHOLDER|$CLOUDFLARE_ACCOUNT_ID|" wrangler.toml
          sed -i "s|STORE_ID_PLACEHOLDER|$CLOUDFLARE_STORE_ID|" wrangler.toml

      - name: Build and Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: yarn deploy
